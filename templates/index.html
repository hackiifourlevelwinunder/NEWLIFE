<!DOCTYPE html>
<html>
<head>

<title>RNG Panel</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

#number{
font-size:80px;
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>

<h2>Period</h2>
<div id="period">--</div>

<h2>Countdown</h2>
<div id="timer">--</div>

<h2>Preview</h2>
<div id="number">--</div>

<h3 id="size"></h3>
<h3 id="color"></h3>

<script>

function loadResult(){

fetch("/api/result")
.then(res => res.json())
.then(data => {

document.getElementById("period").innerText = data.period

document.getElementById("timer").innerText = data.time_left

if(data.preview !== null){
document.getElementById("number").innerText = data.preview
}else{
document.getElementById("number").innerText = "--"
}

document.getElementById("size").innerText = data.size
document.getElementById("color").innerText = data.color

})

}

setInterval(loadResult,1000)

loadResult()

</script>

</body>
</html>
