<!DOCTYPE html>
<html>
<head>

<title>RNG Result</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

.number{
font-size:80px;
font-weight:bold;
}

.timer{
font-size:30px;
}

</style>

</head>

<body>

<h2>Period</h2>
<div id="period">--</div>

<h2>Countdown</h2>
<div class="timer" id="timer">60</div>

<h2>Preview</h2>
<div class="number" id="number">--</div>

<h2 id="size"></h2>
<h2 id="color"></h2>


<script>

function loadResult(){

fetch("/result")
.then(res=>res.json())
.then(data=>{

document.getElementById("period").innerText=data.period;
document.getElementById("number").innerText=data.number;
document.getElementById("size").innerText=data.size;
document.getElementById("color").innerText=data.color;

});

}

loadResult();
setInterval(loadResult,5000);


function startTimer(){

setInterval(function(){

let now = new Date();
let sec = now.getSeconds();

let left = 60-sec;

document.getElementById("timer").innerText = left;

},1000);

}

startTimer();

</script>

</body>
</html>
