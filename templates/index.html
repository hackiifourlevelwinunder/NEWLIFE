<!DOCTYPE html>
<html>
<head>
<title>Live RNG</title>

<style>

body{
background:#0b1b2b;
color:white;
font-family:Arial;
text-align:center;
margin-top:80px;
}

.card{
background:#14263a;
width:320px;
margin:auto;
padding:30px;
border-radius:15px;
}

.number{
font-size:80px;
color:#00ff9c;
}

.wait{
font-size:50px;
color:#00ff9c;
}

</style>

</head>

<body>

<div class="card">

<h2>🎲 Live RNG</h2>

<p>Period: <span id="period">-</span></p>

<p>Time Left: <span id="time">-</span>s</p>

<div id="result" class="wait">Waiting...</div>

</div>

<script>

async function update(){

let res = await fetch("/api/result");

let data = await res.json();

document.getElementById("period").innerText = data.period;

document.getElementById("time").innerText = data.time_left;

if(data.number === null){

document.getElementById("result").innerHTML = "Waiting...";

}else{

document.getElementById("result").innerHTML = "<div class='number'>" + data.number + "</div>";

}

}

setInterval(update,1000);

update();

</script>

</body>
</html>
