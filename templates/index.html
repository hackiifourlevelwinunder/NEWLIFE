<!DOCTYPE html>
<html>
<head>
<title>RNG Result</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.box{
margin-top:100px;
}

.number{
font-size:60px;
font-weight:bold;
}

.small{color:yellow;}
.big{color:red;}

</style>
</head>

<body>

<div class="box">

<h2>Period</h2>
<div id="period">Loading...</div>

<h2>Preview</h2>
<div class="number" id="number">--</div>

<h2 id="size"></h2>
<h2 id="color"></h2>

</div>

<script>

function loadResult(){

fetch("/result")
.then(res=>res.json())
.then(data=>{

document.getElementById("period").innerText = data.period;
document.getElementById("number").innerText = data.number;
document.getElementById("size").innerText = data.size;
document.getElementById("color").innerText = data.color;

});

}

loadResult();
setInterval(loadResult,5000);

</script>

</body>
</html>
