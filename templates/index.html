<!DOCTYPE html>
<html>
<head>

<title>Wingo RNG</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

h1{
font-size:70px;
}

</style>

</head>

<body>

<h3>Period</h3>
<div id="period"></div>

<h3>Countdown</h3>
<div id="countdown"></div>

<h3>Preview</h3>

<h1 id="preview">0</h1>

<div id="bigsmall"></div>

<script>

async function load(){

const res = await fetch("/api/result")
const data = await res.json()

document.getElementById("period").innerText = data.period
document.getElementById("countdown").innerText = data.time_left

document.getElementById("preview").innerText = data.number
document.getElementById("bigsmall").innerText = data.big_small

}

setInterval(load,1000)

load()

</script>

</body>
</html>
