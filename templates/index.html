<!DOCTYPE html>
<html>
<head>
    <title>Live RNG System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>Live RNG</h2>
    <h3 id="round"></h3>
    <div id="timer"></div>
    <div id="result">Waiting...</div>

    <h4>Last 2 Results</h4>
    <ul id="history"></ul>
</div>

<script>
function loadData(){
    fetch('/api/data')
    .then(res => res.json())
    .then(data => {

        document.getElementById("round").innerText = "Round ID: " + data.round_id;
        document.getElementById("timer").innerText = "Time Left: " + data.remaining + "s";

        if(data.result !== null){
            document.getElementById("result").innerText = "Result: " + data.result;
        } else {
            document.getElementById("result").innerText = "Result: Waiting...";
        }

        let historyHTML = "";
        data.history.slice().reverse().forEach(item => {
            historyHTML += `<li>${item[0]} → ${item[1]}</li>`;
        });

        document.getElementById("history").innerHTML = historyHTML;
    });
}

setInterval(loadData, 1000);
loadData();
</script>

</body>
</html>
